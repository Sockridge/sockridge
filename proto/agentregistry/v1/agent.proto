syntax = "proto3";

package agentregistry.v1;

option go_package = "github.com/Sockridge/sockridge/server/gen/go/agentregistry/v1;registryv1";

import "google/protobuf/timestamp.proto";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum TransportType {
  TRANSPORT_TYPE_UNSPECIFIED = 0;
  TRANSPORT_TYPE_GRPC        = 1;
  TRANSPORT_TYPE_HTTP        = 2;
  TRANSPORT_TYPE_GRPC_WEB    = 3;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED  = 0;
  AGENT_STATUS_PENDING      = 1;
  AGENT_STATUS_ACTIVE       = 2;
  AGENT_STATUS_REJECTED     = 3;
  AGENT_STATUS_INACTIVE     = 4;
  AGENT_STATUS_DEPRECATED   = 5;
}

enum InputOutputMode {
  INPUT_OUTPUT_MODE_UNSPECIFIED = 0;
  INPUT_OUTPUT_MODE_TEXT        = 1;
  INPUT_OUTPUT_MODE_FILE        = 2;
  INPUT_OUTPUT_MODE_IMAGE       = 3;
  INPUT_OUTPUT_MODE_AUDIO       = 4;
  INPUT_OUTPUT_MODE_STRUCTURED  = 5;
}

enum AuthScheme {
  AUTH_SCHEME_UNSPECIFIED = 0;
  AUTH_SCHEME_NONE        = 1; // no auth required
  AUTH_SCHEME_API_KEY     = 2; // x-api-key or Bearer token
  AUTH_SCHEME_OAUTH2      = 3; // OAuth2 flow
  AUTH_SCHEME_OPENID      = 4; // OpenID Connect
}

// ─── Core Models ─────────────────────────────────────────────────────────────

// Provider — who built and operates this agent
message Provider {
  string name         = 1; // e.g. "Acme Corp" or "Jane Doe"
  string url          = 2; // organization or personal website
  string contact      = 3; // email or support URL
}

// Authentication — how callers authenticate with this agent
message Authentication {
  AuthScheme scheme       = 1;
  string     description  = 2; // human-readable auth instructions
  string     token_url    = 3; // OAuth2 token endpoint (if applicable)
  string     scopes       = 4; // required OAuth2 scopes (space-separated)
}

// SkillExample — example input/output for a skill
message SkillExample {
  string input  = 1; // example input payload
  string output = 2; // example output payload
}

message Skill {
  string          id          = 1;
  string          name        = 2;
  string          description = 3;
  repeated string tags        = 4;
  repeated float  embedding   = 5 [packed = true]; // server-populated

  // per-skill I/O overrides (if different from agent defaults)
  repeated InputOutputMode input_modes  = 6;
  repeated InputOutputMode output_modes = 7;

  // examples help other agents understand how to use this skill
  repeated SkillExample examples = 8;
}

message Capabilities {
  bool push_notifications = 1;
  bool streaming          = 2;
  bool multi_turn         = 3;
  bool tool_use           = 4;
}

message Interface {
  string        url       = 1;
  TransportType transport = 2;
  bool          primary   = 3;
}

// GatekeeperResult — output of automated validation pipeline
message GatekeeperResult {
  bool   approved         = 1;
  float  confidence_score = 2;
  string reason           = 3;
  bool   reachable        = 4;
  int32  ping_latency_ms  = 5;
  bool   a2a_compliant    = 6;
  bool   a2a_matches_card = 7;
  google.protobuf.Timestamp evaluated_at = 8;
}

message AgentCard {
  string id               = 1;
  string name             = 2;
  string description      = 3;
  string version          = 4;
  string protocol_version = 5;
  string url              = 6; // primary endpoint URL

  repeated Interface       interfaces           = 7;
  repeated Skill           skills               = 8;
  Capabilities             capabilities         = 9;
  repeated InputOutputMode default_input_modes  = 10;
  repeated InputOutputMode default_output_modes = 11;

  // identity
  string publisher_id = 12;
  string public_key   = 13;

  // A2A spec fields
  Provider       provider          = 14; // who built this agent
  Authentication authentication    = 15; // how to authenticate with this agent
  string         icon_url          = 16; // agent avatar URL
  string         documentation_url = 17; // link to agent docs
  repeated string protocol_versions = 18; // supported A2A versions e.g. ["0.3.0", "0.4.0"]
  repeated string extensions        = 19; // supported protocol extensions

  // lifecycle
  AgentStatus               status            = 20;
  GatekeeperResult          gatekeeper_result = 21;
  google.protobuf.Timestamp created_at        = 22;
  google.protobuf.Timestamp updated_at        = 23;

  bytes metadata = 24;
}

// ─── Auth Models ─────────────────────────────────────────────────────────────

message PublisherAccount {
  string id         = 1;
  string handle     = 2;
  string public_key = 3;
  google.protobuf.Timestamp created_at = 4;
}

message SignedPayload {
  bytes  payload   = 1;
  bytes  signature = 2;
  string key_id    = 3;
}

// ─── Access Agreement Models ──────────────────────────────────────────────────

enum AgreementStatus {
  AGREEMENT_STATUS_UNSPECIFIED = 0;
  AGREEMENT_STATUS_PENDING     = 1;
  AGREEMENT_STATUS_ACTIVE      = 2;
  AGREEMENT_STATUS_DENIED      = 3;
  AGREEMENT_STATUS_REVOKED     = 4;
}

message AccessAgreement {
  string          id           = 1;
  string          requester_id = 2;
  string          receiver_id  = 3;
  string          message      = 4;
  AgreementStatus status       = 5;
  string          shared_key   = 6;
  google.protobuf.Timestamp requested_at = 7;
  google.protobuf.Timestamp resolved_at  = 8;
  google.protobuf.Timestamp expires_at   = 9;  // optional, null = never expires
}

// Webhook — publisher registers a URL to receive push events
message Webhook {
  string id           = 1;
  string publisher_id = 2;
  string url          = 3; // HTTPS endpoint to receive events
  repeated string events = 4; // which events to subscribe to
  string secret      = 5; // HMAC-SHA256 signing secret
  bool   active      = 6;
  google.protobuf.Timestamp created_at = 7;
}

// ─── Access Token Models ──────────────────────────────────────────────────────

message AccessToken {
  string id          = 1;
  string agent_id    = 2;
  string consumer_id = 3;
  string token       = 4;
  google.protobuf.Timestamp expires_at  = 5;
  google.protobuf.Timestamp created_at  = 6;
}
