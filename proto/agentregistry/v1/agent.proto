syntax = "proto3";

package agentregistry.v1;

option go_package = "github.com/Sockridge/sockridge/server/gen/go/agentregistry/v1;registryv1";

import "google/protobuf/timestamp.proto";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum TransportType {
  TRANSPORT_TYPE_UNSPECIFIED = 0;
  TRANSPORT_TYPE_GRPC        = 1;
  TRANSPORT_TYPE_HTTP        = 2;
  TRANSPORT_TYPE_GRPC_WEB    = 3;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED  = 0;
  AGENT_STATUS_PENDING      = 1; // submitted, gatekeeper running
  AGENT_STATUS_ACTIVE       = 2; // approved and live
  AGENT_STATUS_REJECTED     = 3; // gatekeeper rejected
  AGENT_STATUS_INACTIVE     = 4; // was active, now unreachable
  AGENT_STATUS_DEPRECATED   = 5; // manually deprecated by publisher
}

enum InputOutputMode {
  INPUT_OUTPUT_MODE_UNSPECIFIED = 0;
  INPUT_OUTPUT_MODE_TEXT        = 1;
  INPUT_OUTPUT_MODE_FILE        = 2;
  INPUT_OUTPUT_MODE_IMAGE       = 3;
  INPUT_OUTPUT_MODE_AUDIO       = 4;
  INPUT_OUTPUT_MODE_STRUCTURED  = 5;
}

// ─── Core Models ─────────────────────────────────────────────────────────────

message Skill {
  string          id          = 1;
  string          name        = 2;
  string          description = 3;
  repeated string tags        = 4;
  repeated float  embedding   = 5 [packed = true]; // server-populated
}

message Capabilities {
  bool push_notifications = 1;
  bool streaming          = 2;
  bool multi_turn         = 3;
  bool tool_use           = 4;
}

message Interface {
  string        url       = 1;
  TransportType transport = 2;
  bool          primary   = 3;
}

// GatekeeperResult is the output of the automated validation pipeline.
// Stored alongside the AgentCard and visible to consumers.
message GatekeeperResult {
  bool   approved         = 1;
  float  confidence_score = 2; // 0.0 - 1.0
  string reason           = 3; // human-readable explanation
  bool   reachable        = 4; // did the ping succeed?
  int32  ping_latency_ms  = 5; // response time in ms
  bool   a2a_compliant    = 6; // responded to /.well-known/agent.json
  bool   a2a_matches_card = 7; // card fields match submission
  google.protobuf.Timestamp evaluated_at = 8;
}

message AgentCard {
  string id               = 1;
  string name             = 2;
  string description      = 3;
  string version          = 4;
  string protocol_version = 5;
  string url              = 6; // primary endpoint url

  repeated Interface       interfaces           = 7;
  repeated Skill           skills               = 8;
  Capabilities             capabilities         = 9;
  repeated InputOutputMode default_input_modes  = 10;
  repeated InputOutputMode default_output_modes = 11;

  // identity
  string publisher_id = 12;
  string public_key   = 13;

  // lifecycle
  AgentStatus               status             = 14;
  GatekeeperResult          gatekeeper_result  = 15; // populated after validation
  google.protobuf.Timestamp created_at         = 16;
  google.protobuf.Timestamp updated_at         = 17;

  bytes metadata = 18;
}

// ─── Auth Models ─────────────────────────────────────────────────────────────

message PublisherAccount {
  string id         = 1;
  string handle     = 2;
  string public_key = 3;
  google.protobuf.Timestamp created_at = 4;
}

message SignedPayload {
  bytes  payload   = 1;
  bytes  signature = 2;
  string key_id    = 3;
}

// ─── Access Token Models ──────────────────────────────────────────────────────

// AccessToken is issued to a consumer (human or agent) granting them
// the right to retrieve an agent's endpoint URL and communicate with it.
message AccessToken {
  string id          = 1; // uuid
  string agent_id    = 2; // which agent this grants access to
  string consumer_id = 3; // who requested it (publisher_id or external id)
  string token       = 4; // the actual bearer token value
  google.protobuf.Timestamp expires_at  = 5;
  google.protobuf.Timestamp created_at  = 6;
}

// ─── Access Agreement Models ──────────────────────────────────────────────────

enum AgreementStatus {
  AGREEMENT_STATUS_UNSPECIFIED = 0;
  AGREEMENT_STATUS_PENDING     = 1; // request sent, waiting for approval
  AGREEMENT_STATUS_ACTIVE      = 2; // approved, shared key generated
  AGREEMENT_STATUS_DENIED      = 3; // rejected by receiving publisher
  AGREEMENT_STATUS_REVOKED     = 4; // was active, one side revoked it
}

message AccessAgreement {
  string          id                = 1; // uuid
  string          requester_id      = 2; // publisher who sent the request
  string          receiver_id       = 3; // publisher who approves/denies
  string          message           = 4; // "why I want to connect"
  AgreementStatus status            = 5;
  string          shared_key        = 6; // set on approval, same for both sides
  google.protobuf.Timestamp requested_at = 7;
  google.protobuf.Timestamp resolved_at  = 8; // when approved/denied/revoked
}
