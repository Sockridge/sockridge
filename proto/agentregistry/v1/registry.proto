syntax = "proto3";

package agentregistry.v1;

option go_package = "github.com/utsav-develops/SocialAgents/server/gen/go/agentregistry/v1;registryv1";

import "agentregistry/v1/agent.proto";
import "google/protobuf/timestamp.proto";

// ─── Registry Service ─────────────────────────────────────────────────────────

service RegistryService {
  rpc RegisterPublisher (RegisterPublisherRequest)       returns (RegisterPublisherResponse);
  rpc AuthChallenge     (AuthChallengeRequest)           returns (AuthChallengeResponse);
  rpc AuthVerify        (AuthVerifyRequest)              returns (AuthVerifyResponse);
  rpc PublishAgent      (PublishAgentRequest)            returns (PublishAgentResponse);
  rpc UpdateAgent       (UpdateAgentRequest)             returns (UpdateAgentResponse);
  rpc DeprecateAgent    (DeprecateAgentRequest)          returns (DeprecateAgentResponse);
  rpc GetAgent          (RegistryServiceGetAgentRequest) returns (RegistryServiceGetAgentResponse);
}

// ─── Discovery Service ───────────────────────────────────────────────────────

service DiscoveryService {
  rpc GetAgent       (DiscoveryServiceGetAgentRequest) returns (DiscoveryServiceGetAgentResponse);
  rpc ListAgents     (ListAgentsRequest)               returns (stream ListAgentsResponse);
  rpc SemanticSearch (SemanticSearchRequest)           returns (stream SemanticSearchResponse);
  rpc Watch          (WatchRequest)                    returns (stream WatchResponse);
}

// ─── Auth ─────────────────────────────────────────────────────────────────────

message RegisterPublisherRequest {
  string handle     = 1;
  string public_key = 2;
}

message RegisterPublisherResponse {
  string           publisher_id = 1;
  PublisherAccount account      = 2;
}

message AuthChallengeRequest {
  string publisher_id = 1;
}

message AuthChallengeResponse {
  string                    nonce      = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message AuthVerifyRequest {
  string publisher_id = 1;
  string nonce        = 2;
  bytes  signature    = 3;
}

message AuthVerifyResponse {
  string                    session_token = 1;
  google.protobuf.Timestamp expires_at    = 2;
}

// ─── Registry RPCs ────────────────────────────────────────────────────────────

message PublishAgentRequest {
  SignedPayload payload = 1;
}

message PublishAgentResponse {
  string    agent_id = 1;
  AgentCard agent    = 2;
}

message UpdateAgentRequest {
  SignedPayload payload = 1;
}

message UpdateAgentResponse {
  AgentCard agent = 1;
}

message DeprecateAgentRequest {
  string publisher_id = 1;
  string agent_id     = 2;
  string reason       = 3;
}

message DeprecateAgentResponse {
  AgentCard agent = 1;
}

message RegistryServiceGetAgentRequest {
  string agent_id = 1;
}

message RegistryServiceGetAgentResponse {
  AgentCard agent = 1;
}

// ─── Discovery RPCs ───────────────────────────────────────────────────────────

message DiscoveryServiceGetAgentRequest {
  string agent_id = 1;
}

message DiscoveryServiceGetAgentResponse {
  AgentCard agent = 1;
}

message ListAgentsRequest {
  repeated string tags         = 1;
  repeated string capabilities = 2;
  AgentStatus     status       = 3;
  uint32          limit        = 4;
  string          page_token   = 5;
}

message ListAgentsResponse {
  AgentCard agent           = 1;
  string    next_page_token = 2;
}

message SemanticSearchRequest {
  string      query     = 1;
  uint32      top_k     = 2;
  float       min_score = 3;
  AgentStatus status    = 4;
}

message SemanticSearchResponse {
  AgentCard agent = 1;
  float     score = 2;
}

message WatchRequest {
  repeated string tags         = 1;
  repeated string capabilities = 2;
}

message WatchResponse {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_PUBLISHED   = 1;
    EVENT_TYPE_UPDATED     = 2;
    EVENT_TYPE_DEPRECATED  = 3;
  }
  EventType                 event_type  = 1;
  AgentCard                 agent       = 2;
  google.protobuf.Timestamp occurred_at = 3;
}
