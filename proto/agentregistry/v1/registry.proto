syntax = "proto3";

package agentregistry.v1;

option go_package = "github.com/Sockridge/sockridge/server/gen/go/agentregistry/v1;registryv1";

import "agentregistry/v1/agent.proto";
import "google/protobuf/timestamp.proto";

// ─── Registry Service ─────────────────────────────────────────────────────────

service RegistryService {
  rpc RegisterPublisher (RegisterPublisherRequest) returns (RegisterPublisherResponse);
  rpc AuthChallenge     (AuthChallengeRequest)     returns (AuthChallengeResponse);
  rpc AuthVerify        (AuthVerifyRequest)        returns (AuthVerifyResponse);
  rpc PublishAgent      (PublishAgentRequest)      returns (PublishAgentResponse);
  rpc UpdateAgent       (UpdateAgentRequest)       returns (UpdateAgentResponse);
  rpc DeprecateAgent    (DeprecateAgentRequest)    returns (DeprecateAgentResponse);
  rpc GetAgent          (RegistryServiceGetAgentRequest) returns (RegistryServiceGetAgentResponse);
}

// ─── Discovery Service ───────────────────────────────────────────────────────

service DiscoveryService {
  rpc GetAgent       (DiscoveryServiceGetAgentRequest) returns (DiscoveryServiceGetAgentResponse);
  rpc ListAgents     (ListAgentsRequest)               returns (stream ListAgentsResponse);
  rpc SemanticSearch (SemanticSearchRequest)           returns (stream SemanticSearchResponse);
  rpc Watch          (WatchRequest)                    returns (stream WatchResponse);
}

// ─── Access Agreement Service ─────────────────────────────────────────────────

service AccessAgreementService {
  rpc RequestAccess   (RequestAccessRequest)   returns (RequestAccessResponse);
  rpc ListPending     (ListPendingRequest)      returns (stream ListPendingResponse);
  rpc ApproveAccess   (ApproveAccessRequest)   returns (ApproveAccessResponse);
  rpc DenyAccess      (DenyAccessRequest)      returns (DenyAccessResponse);
  rpc RevokeAccess    (RevokeAccessRequest)    returns (RevokeAccessResponse);
  rpc ListAgreements  (ListAgreementsRequest)  returns (stream ListAgreementsResponse);
  rpc ResolveEndpoint (ResolveEndpointRequest) returns (ResolveEndpointResponse);
  rpc GetAgreement    (GetAgreementRequest)    returns (GetAgreementResponse);
}

// ─── Auth Messages ────────────────────────────────────────────────────────────

message RegisterPublisherRequest {
  string handle     = 1;
  string public_key = 2;
}

message RegisterPublisherResponse {
  string           publisher_id = 1;
  PublisherAccount account      = 2;
}

message AuthChallengeRequest {
  string publisher_id = 1;
}

message AuthChallengeResponse {
  string                    nonce      = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message AuthVerifyRequest {
  string publisher_id = 1;
  string nonce        = 2;
  bytes  signature    = 3;
}

message AuthVerifyResponse {
  string                    session_token = 1;
  google.protobuf.Timestamp expires_at    = 2;
}

// ─── Registry RPCs ────────────────────────────────────────────────────────────

message PublishAgentRequest {
  SignedPayload payload = 1;
}

message PublishAgentResponse {
  string    agent_id = 1;
  AgentCard agent    = 2;
}

message UpdateAgentRequest {
  SignedPayload payload = 1;
}

message UpdateAgentResponse {
  AgentCard agent = 1;
}

message DeprecateAgentRequest {
  string publisher_id = 1;
  string agent_id     = 2;
  string reason       = 3;
}

message DeprecateAgentResponse {
  AgentCard agent = 1;
}

message RegistryServiceGetAgentRequest {
  string agent_id = 1;
}

message RegistryServiceGetAgentResponse {
  AgentCard agent = 1;
}

// ─── Discovery RPCs ───────────────────────────────────────────────────────────

message DiscoveryServiceGetAgentRequest {
  string agent_id = 1;
}

message DiscoveryServiceGetAgentResponse {
  AgentCard agent = 1;
}

message ListAgentsRequest {
  repeated string tags         = 1;
  repeated string capabilities = 2;
  AgentStatus     status       = 3;
  uint32          limit        = 4;
  string          page_token   = 5;
}

message ListAgentsResponse {
  AgentCard agent           = 1;
  string    next_page_token = 2;
}

message SemanticSearchRequest {
  string      query     = 1;
  uint32      top_k     = 2;
  float       min_score = 3;
  AgentStatus status    = 4;
}

message SemanticSearchResponse {
  AgentCard agent = 1;
  float     score = 2;
}

message WatchRequest {
  repeated string tags         = 1;
  repeated string capabilities = 2;
}

message WatchResponse {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_PUBLISHED   = 1;
    EVENT_TYPE_UPDATED     = 2;
    EVENT_TYPE_DEPRECATED  = 3;
  }
  EventType                 event_type  = 1;
  AgentCard                 agent       = 2;
  google.protobuf.Timestamp occurred_at = 3;
}

// ─── Access Agreement RPCs ────────────────────────────────────────────────────

message RequestAccessRequest {
  string requester_id = 1;
  string receiver_id  = 2;
  string message      = 3;
}

message RequestAccessResponse {
  AccessAgreement agreement = 1;
}

message ListPendingRequest {
  string publisher_id = 1;
}

message ListPendingResponse {
  AccessAgreement agreement        = 1;
  string          requester_handle = 2;
}

message ApproveAccessRequest {
  string publisher_id = 1;
  string agreement_id = 2;
}

message ApproveAccessResponse {
  AccessAgreement agreement  = 1;
  string          shared_key = 2;
}

message DenyAccessRequest {
  string publisher_id = 1;
  string agreement_id = 2;
}

message DenyAccessResponse {
  AccessAgreement agreement = 1;
}

message RevokeAccessRequest {
  string publisher_id = 1;
  string agreement_id = 2;
}

message RevokeAccessResponse {
  bool revoked = 1;
}

message ListAgreementsRequest {
  string publisher_id = 1;
}

message ListAgreementsResponse {
  AccessAgreement agreement    = 1;
  string          other_handle = 2;
}

message ResolveEndpointRequest {
  string agent_id   = 1;
  string shared_key = 2;
}

message ResolveEndpointResponse {
  string    agent_id   = 1;
  string    url        = 2;
  string    transport  = 3;
  string    agent_name = 4;
  AgentCard agent      = 5; // full card — skills, capabilities, version
}

message GetAgreementRequest {
  string publisher_id = 1;
  string agreement_id = 2;
}

message GetAgreementResponse {
  AccessAgreement agreement = 1;
}

// ─── Audit Log Service ────────────────────────────────────────────────────────

service AuditService {
  rpc ListEvents (ListAuditEventsRequest) returns (stream ListAuditEventsResponse);
}

message AuditEvent {
  string                    id           = 1;
  string                    publisher_id = 2;
  string                    action       = 3; // publish | update | deprecate | login | access_request | access_approve | access_revoke | resolve
  string                    agent_id     = 4; // if applicable
  string                    target_id    = 5; // agreement_id or other target
  string                    ip           = 6;
  string                    detail       = 7; // human-readable detail
  google.protobuf.Timestamp occurred_at  = 8;
}

message ListAuditEventsRequest {
  string publisher_id = 1;
  uint32 limit        = 2;
}

message ListAuditEventsResponse {
  AuditEvent event = 1;
}
